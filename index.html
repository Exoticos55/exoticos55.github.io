<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acompanhamento — Algoritmos</title>
  <link rel="stylesheet" href="style.css?v=11" />
</head>
<body>
  <div class="layout">

    <aside class="sidebar">
      <div class="hero-icon">
        <img src="icon-eletrica.svg?v=8" alt="Símbolo de engenharia elétrica" />
      </div>
      <p class="eyebrow">// eng. elétrica</p>
      <h1>Painel de<br />Atividades</h1>
      <p class="subtitle">
        Histórico das atividades enviadas no Classroom.
      </p>
      <div class="meta-row">
        <span class="meta-pill" id="nome-aluno">aluno: edite em index.html</span>
        <span class="meta-pill" id="ultima-atualizacao">atualizado em: --</span>
      </div>

      <section class="progress-section" id="progress-section">
        <!-- preenchido via JS -->
      </section>

      <section class="summary" id="summary">
        <!-- preenchido via JS -->
      </section>

      <section class="filters" id="filters">
        <button class="filter-btn active" data-filter="todas">Todas</button>
        <button class="filter-btn" data-filter="enviada">Enviadas</button>
        <button class="filter-btn" data-filter="feita_nao_confirmada">Feitas (não confirmadas)</button>
        <button class="filter-btn" data-filter="pendente">Pendentes</button>
        <button class="filter-btn" data-filter="atrasada">Atrasadas</button>
      </section>

      <footer>
        <a href="admin.html">+ adicionar atividade</a>
        <span id="contador-rodape"></span>
      </footer>
    </aside>

    <main class="content">
      <div class="activity-list" id="activity-list">
        <!-- preenchido via JS -->
      </div>
    </main>

  </div>

  <div class="file-modal-overlay hidden" id="file-modal-overlay">
    <div class="file-modal">
      <div class="file-modal-header">
        <h4 id="file-modal-titulo">arquivo</h4>
        <div class="file-modal-actions">
          <a id="file-modal-abrir" href="#" target="_blank" rel="noopener">Abrir em outra aba</a>
          <button type="button" id="file-modal-fechar">Fechar</button>
        </div>
      </div>
      <div class="file-modal-body" id="file-modal-body">
        <!-- preenchido via JS -->
      </div>
    </div>
  </div>

  <script src="activities.js?v=6"></script>
  <script src="main.js?v=8"></script>
</body>
</html>
